<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>iframe-flight demo</title>

  <script type="importmap">
  {
    "imports": {
      "iframe-flight": "https://ihatexcel.github.io/iframe-flight/iframe-flight.esm.js"
    }
  }
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 0;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #111;
      color: white;
      font-size: 14px;
    }

    iframe {
      width: 100%;
      height: 560px;
      border: 1px solid #ccc;
      border-radius: 12px;
      background: white;
      margin-top: 20px;
    }

    #status {
      margin-top: 12px;
      color: #555;
    }
  </style>
</head>

<body>

  <h1>iframe-flight — Parent → iframe</h1>

  <button id="sendBtn">
    Envoyer des données Arrow
  </button>

  <div id="status"></div>

  <iframe id="chartFrame"></iframe>

  <script type="module">

    import {
      ArrowParentEmitter,
      tableFromArrays,
      tableToIPC
    } from 'iframe-flight';

    const iframe = document.getElementById('chartFrame');
    const status = document.getElementById('status');

    // ------------------------------------------------------------------
    // HTML du child iframe
    // ------------------------------------------------------------------

    const childHtml = `
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script type="importmap">
  {
    "imports": {
      "iframe-flight": "https://ihatexcel.github.io/iframe-flight/iframe-flight.esm.js"
    }
  }
  <\/script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: white;
    }

    h2 {
      margin-top: 0;
    }

    #chart {
      width: 100%;
    }
  </style>
</head>

<body>

  <h2>Revenue par produit</h2>

  <div id="chart"></div>

  <script type="module">

    import { ArrowChildReceiver }
      from 'iframe-flight';

    import vegaEmbed
      from 'https://cdn.jsdelivr.net/npm/vega-embed@6/+esm';

    const receiver = new ArrowChildReceiver({
      allowedOrigins: ['*']
    });

    receiver.onData(async (result) => {

      const rows = [];
      const table = result.table;

      for (let i = 0; i < table.numRows; i++) {

        const row = {};

        table.schema.fields.forEach((field, columnIndex) => {
          row[field.name] =
            table.getChildAt(columnIndex).get(i);
        });

        rows.push(row);
      }

      document.getElementById('chart').innerHTML = '';

      await vegaEmbed(
        '#chart',
        {
          width: 700,

          data: {
            values: rows
          },

          mark: {
            type: 'bar',
            cornerRadiusEnd: 4
          },

          encoding: {
            y: {
              field: 'product',
              type: 'nominal',
              sort: '-x'
            },

            x: {
              field: 'revenue',
              type: 'quantitative'
            },

            color: {
              field: 'growth',
              type: 'quantitative',
              scale: {
                scheme: 'redyellowgreen'
              }
            }
          }
        },
        {
          actions: false
        }
      );
    });

  <\/script>

</body>
</html>
`;

    iframe.srcdoc = childHtml;

    // ------------------------------------------------------------------
    // Données Arrow
    // ------------------------------------------------------------------

    const PRODUCTS = [
      'Aurora',
      'Beacon',
      'Catalyst',
      'Dynamo',
      'Eclipse',
      'Fusion',
      'Galaxy',
      'Helix',
      'Ignite',
      'Jupiter'
    ];

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randInt(min, max) {
      return Math.floor(rand(min, max));
    }

    function makeSnapshot(n) {

      const products = PRODUCTS.slice(0, n);

      const revenue = Float64Array.from(
        products.map(() => rand(10, 100))
      );

      const growth = Float64Array.from(
        products.map(() => rand(-25, 25))
      );

      const units = Int32Array.from(
        products.map(() => randInt(5000, 50000))
      );

      return tableToIPC(
        tableFromArrays({
          product: products,
          revenue,
          growth,
          units
        })
      );
    }

    // ------------------------------------------------------------------
    // Communication parent → iframe
    // ------------------------------------------------------------------

    iframe.addEventListener('load', async () => {

      const emitter = new ArrowParentEmitter(iframe);

      await emitter.onReady();

      status.textContent = 'iframe prête';

      async function sendData() {

        const ack = await emitter.send(
          makeSnapshot(10)
        );

        status.textContent =
          ack.rows +
          ' rows envoyées · ' +
          ack.processingTime +
          'ms';
      }

      document
        .getElementById('sendBtn')
        .addEventListener('click', sendData);

      // premier envoi auto
      sendData();
    });

  </script>

</body>
</html>
