<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iframe-flight child</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --muted:   #8b949e;
      --text:    #c9d1d9;
      --green:   #3fb950;
      --accent:  #58a6ff;
      --red:     #f85149;
      --yellow:  #d29922;
      --purple:  #bc8cff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--yellow);
      animation: pulse 1.2s infinite;
      flex-shrink: 0;
    }
    .dot.ready { background: var(--green); animation: none; box-shadow: 0 0 5px var(--green); }
    .dot.error { background: var(--red); animation: none; }

    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.3; }
    }

    .state-txt { color: var(--text); }

    /* Handshake visualisation inside child */
    .hs-row {
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .hs-row span { transition: color 0.3s; }
    .hs-row .done { color: var(--green); }

    .log {
      font-family: 'SFMono-Regular', 'Fira Code', monospace;
      font-size: 0.7rem;
      padding: 0.5rem 0.75rem;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .log-row {
      display: grid;
      grid-template-columns: 5rem 1fr;
      gap: 0.3rem;
      line-height: 1.45;
    }
    .log-ts  { color: var(--muted); }
    .log-msg { color: var(--text); word-break: break-all; }
    .log-row.ok   .log-msg { color: var(--green); }
    .log-row.err  .log-msg { color: var(--red); }
    .log-row.info .log-msg { color: var(--accent); }
    .log-row.warn .log-msg { color: var(--yellow); }
    .log-row.recv .log-msg { color: var(--purple); }

    /* Last received data preview */
    .data-preview {
      padding: 0.5rem 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      font-family: 'SFMono-Regular', 'Fira Code', monospace;
      color: var(--muted);
      background: #0d1117;
      min-height: 2rem;
      flex-shrink: 0;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 80px;
      overflow: auto;
    }
    .data-preview.has-data { color: var(--purple); }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="dot" id="dot"></div>
    Child receiver —
    <span class="state-txt" id="state-txt">CONNECTING</span>
  </div>

  <div class="hs-row">
    <span id="hs-sent">⬜ CHILD_READY sent</span>
    <span>→</span>
    <span id="hs-ack">⬜ PARENT_ACK received</span>
    <span>→</span>
    <span id="hs-ready">⬜ Ready</span>
  </div>

  <div class="log" id="log"></div>

  <div class="data-preview" id="preview">No data received yet.</div>

<script src="./iframe-flight.iife.js"></script>
<script>
(function () {
  'use strict';

  const { ArrowChildReceiver, ListenMode, State } = window.ArrowBridge;

  /* ── DOM helpers ── */
  function q(id) { return document.getElementById(id); }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function log(msg, type) {
    var panel = q('log');
    var now   = new Date().toISOString().slice(11, 23);
    var row   = document.createElement('div');
    row.className = 'log-row' + (type ? ' ' + type : '');
    row.innerHTML =
      '<span class="log-ts">'  + now + '</span>' +
      '<span class="log-msg">' + escHtml(msg) + '</span>';
    panel.appendChild(row);
    panel.scrollTop = panel.scrollHeight;
  }

  /* Relay to parent for the child-log panel in parent page */
  function relay(msg, type, state) {
    try {
      window.parent.postMessage({
        __iframeFlight: 'log',
        msg: msg,
        type: type,
        state: state,
      }, '*');
    } catch (_) {}
  }

  function setDot(s) {
    var dot = q('dot');
    dot.className = 'dot' + (s === State.READY ? ' ready' : s === State.ERROR ? ' error' : '');
    q('state-txt').textContent = s;
  }

  function hsStep(id) {
    var el = q(id);
    el.textContent = el.textContent.replace('⬜', '✅');
    el.className = 'done';
  }

  /* ── Receiver ── */
  const receiver = new ArrowChildReceiver({
    listenMode: ListenMode.CONTINUOUS,
    listenDelay: 0,
    allowedOrigins: ['*'],
  });

  log('Receiver initialised — CHILD_READY sent to parent', 'info');
  relay('CHILD_READY sent to parent', 'info', State.CONNECTING);
  hsStep('hs-sent');

  receiver
    .onStateChange(function (next, prev) {
      setDot(next);
      log('State: ' + prev + ' → ' + next, 'info');
      relay('State: ' + prev + ' → ' + next, 'info', next);

      if (next === State.READY && prev === State.CONNECTING) {
        hsStep('hs-ack');
        hsStep('hs-ready');
        log('✅ Handshake complete — listening for data', 'ok');
        relay('✅ Handshake complete — listening for data', 'ok', next);
      }
    })
    .onData(function (result) {
      var mode = result.isZeroCopy ? '⚡ zero-copy' : 'copy';
      var summary =
        '📥 [' + result.format + '] ' + mode +
        ' | rows=' + result.rows +
        ' cols=' + result.cols +
        ' size=' + result.size + 'B' +
        ' time=' + result.processingTime + 'ms';

      log(summary, 'recv');
      relay(summary, 'recv', receiver.getState());

      /* Update preview */
      var preview = q('preview');
      preview.className = 'data-preview has-data';
      if (result.data !== undefined) {
        preview.textContent = JSON.stringify(result.data, null, 2).slice(0, 400);
      } else if (result.table) {
        preview.textContent =
          'Arrow table: ' + result.rows + ' rows × ' + result.cols + ' cols\n' +
          'isZeroCopy: ' + result.isZeroCopy;
      }

      if (result.correlationId) {
        log('correlationId: ' + result.correlationId, '');
        relay('correlationId: ' + result.correlationId, '', receiver.getState());
      }
    })
    .onError(function (err) {
      log('❌ ' + err.message, 'err');
      relay('❌ ' + err.message, 'err', receiver.getState());
    });
})();
</script>
</body>
</html>
