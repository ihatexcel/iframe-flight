<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iframe-flight child</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0d1117; --surface: #161b22; --border: #30363d;
      --muted:  #8b949e; --text:    #c9d1d9;
      --green:  #3fb950; --accent:  #58a6ff; --red:    #f85149;
      --yellow: #d29922; --purple:  #bc8cff; --orange: #e3b341;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Top bar ── */
    .top-bar {
      padding: 0.4rem 0.65rem;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.68rem; font-weight: 600; flex-shrink: 0;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--yellow); animation: pulse 1.2s infinite; flex-shrink: 0;
    }
    .dot.ready   { background: var(--green);  animation: none; box-shadow: 0 0 5px var(--green); }
    .dot.recv    { background: var(--purple); animation: none; box-shadow: 0 0 5px var(--purple); }
    .dot.error   { background: var(--red);    animation: none; }
    .dot.closed  { background: var(--muted);  animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Source ID chip */
    .source-id {
      font-family: 'SFMono-Regular', 'Fira Code', monospace;
      font-size: 0.62rem; font-weight: 700;
      background: #1f3a5f; color: var(--accent);
      border: 1px solid #388bfd33;
      padding: .1rem .45rem; border-radius: 4px;
      letter-spacing: .02em;
    }
    .mode-badge {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      padding: .1rem .4rem; border-radius: 4px;
    }
    .mode-continuous { background: #1c2f1c; color: var(--green);  border: 1px solid #3fb95033; }
    .mode-first      { background: #2d2a1a; color: var(--orange); border: 1px solid #e3b34133; }

    .listen-state {
      margin-left: auto; font-size: 0.62rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.25rem;
    }
    .listen-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 4px var(--green); }
    .listen-dot.paused { background: var(--muted); box-shadow: none; }

    /* ── Handshake ── */
    .hs-bar {
      padding: 0.3rem 0.65rem; border-bottom: 1px solid var(--border);
      font-size: 0.65rem; color: var(--muted);
      display: flex; align-items: center; gap: 0.3rem; flex-shrink: 0;
    }
    .hs-bar span { transition: color .25s; }
    .hs-bar .done { color: var(--green); }
    .hs-bar .sep  { color: var(--border); }

    /* ── Log ── */
    .log {
      font-family: 'SFMono-Regular', 'Fira Code', monospace;
      font-size: 0.67rem; padding: 0.45rem 0.65rem;
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 0.15rem;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .log-row { display: grid; grid-template-columns: 4.8rem 1fr; gap: 0.25rem; line-height: 1.45; }
    .log-ts  { color: var(--muted); }
    .log-msg { color: var(--text); word-break: break-all; }
    .log-row.ok   .log-msg { color: var(--green); }
    .log-row.err  .log-msg { color: var(--red); }
    .log-row.info .log-msg { color: var(--accent); }
    .log-row.recv .log-msg { color: var(--purple); }
    .log-row.warn .log-msg { color: var(--orange); }

    /* ── Controls ── */
    .controls {
      padding: 0.35rem 0.65rem; border-top: 1px solid var(--border);
      display: flex; gap: 0.4rem; flex-shrink: 0; align-items: center;
      font-size: 0.68rem;
    }
    .ctrl-label { color: var(--muted); font-weight: 600; font-size: 0.65rem; }
    button.reply-btn {
      padding: .25rem .6rem; border-radius: 5px; border: 1px solid #bc8cff33;
      background: #2a1a3d; color: var(--purple); font-size: 0.68rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    button.reply-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Preview ── */
    .preview {
      padding: 0.4rem 0.65rem; border-top: 1px solid var(--border);
      font-family: 'SFMono-Regular', monospace; font-size: 0.65rem;
      color: var(--muted); background: #080c10;
      white-space: pre-wrap; word-break: break-all;
      max-height: 64px; overflow: auto; flex-shrink: 0;
    }
    .preview.has-data { color: var(--purple); }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="dot" id="dot"></div>
    <span id="state-txt">CONNECTING</span>
    <span class="source-id" id="source-id-chip">…</span>
    <span class="mode-badge" id="mode-badge">…</span>
    <div class="listen-state">
      <div class="listen-dot" id="listen-dot"></div>
      <span id="listen-label">listening</span>
    </div>
  </div>

  <div class="hs-bar">
    <span id="hs-sent">⬜ CHILD_READY</span>
    <span class="sep">→</span>
    <span id="hs-ack">⬜ PARENT_ACK</span>
    <span class="sep">→</span>
    <span id="hs-ready">⬜ Ready</span>
  </div>

  <div class="log" id="log"></div>

  <div class="controls">
    <span class="ctrl-label">↑ Reverse channel:</span>
    <button class="reply-btn" id="btn-reply" disabled>Reply to parent (raw postMessage)</button>
  </div>

  <div class="preview" id="preview">No data received yet.</div>

<script type="importmap">
{"imports": {"iframe-flight": "./iframe-flight.esm.js"}}
</script>
<script type="module">
  import { ArrowChildReceiver, ListenMode, State } from 'iframe-flight';

  const params    = new URLSearchParams(window.location.search);
  const sourceId  = params.get('sourceId') || ('child-' + Math.random().toString(36).slice(2, 7));
  const isFirst   = params.get('mode') === 'first';
  const delay     = parseInt(params.get('delay') || '0', 10);
  const listenMode = isFirst ? ListenMode.FIRST_MESSAGE : ListenMode.CONTINUOUS;

  /* ── DOM ── */
  function q(id) { return document.getElementById(id); }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function log(msg, type) {
    const panel = q('log');
    const now   = new Date().toISOString().slice(11, 23);
    const row   = document.createElement('div');
    row.className = 'log-row' + (type ? ' ' + type : '');
    row.innerHTML = '<span class="log-ts">' + now + '</span><span class="log-msg">' + escHtml(msg) + '</span>';
    panel.appendChild(row);
    panel.scrollTop = panel.scrollHeight;
  }
  function relay(msg, type, state, meta) {
    try {
      window.parent.postMessage({ __iframeFlight: 'log', msg, type, state, sourceId, meta }, '*');
    } catch(_) {}
  }

  /* Init display */
  q('source-id-chip').textContent = sourceId;
  const badge = q('mode-badge');
  badge.textContent = isFirst ? 'FIRST_MESSAGE' : 'CONTINUOUS' + (delay ? ' ' + delay + 'ms' : '');
  badge.className   = 'mode-badge ' + (isFirst ? 'mode-first' : 'mode-continuous');

  function setDot(s) {
    const map = { READY:'ready', RECEIVING:'recv', ERROR:'error', CLOSED:'closed' };
    q('dot').className   = 'dot ' + (map[s] || '');
    q('state-txt').textContent = s;
  }
  function setListenActive(active) {
    q('listen-dot').className   = 'listen-dot' + (active ? '' : ' paused');
    q('listen-label').textContent = active ? 'listening' : 'paused';
  }
  function hsStep(id) {
    const el = q(id);
    el.textContent = el.textContent.replace('⬜', '✅');
    el.className   = 'done';
  }

  /* ── Receiver ── */
  const receiver = new ArrowChildReceiver({ listenMode, listenDelay: delay, allowedOrigins: ['*'], sourceId });

  log('Init — sourceId: ' + sourceId, 'info');
  log('CHILD_READY → parent', 'info');
  relay('CHILD_READY sent', 'info', State.CONNECTING);
  hsStep('hs-sent');

  receiver
    .onStateChange((next, prev) => {
      setDot(next);
      log('State: ' + prev + ' → ' + next, 'info');
      relay('State: ' + prev + ' → ' + next, 'info', next);
      if (next === State.READY && prev === State.CONNECTING) {
        hsStep('hs-ack'); hsStep('hs-ready');
        log('✅ Handshake complete', 'ok');
        relay('✅ Handshake complete', 'ok', next);
        q('btn-reply').disabled = false;
      }
    })
    .onData((result) => {
      const mode    = result.isZeroCopy ? '⚡ zero-copy' : 'copy';
      const summary = '📥 [' + result.format + '] ' + mode +
        ' rows=' + result.rows + ' cols=' + result.cols +
        ' size=' + result.size + 'B time=' + result.processingTime + 'ms';
      log(summary, 'recv');

      /* metadata shown in parent inspector */
      relay(summary, 'recv', receiver.getState(), {
        messageId:     result.messageId,
        timestamp:     result.timestamp,
        correlationId: result.correlationId,
        format:        result.format,
        rows:          result.rows,
        cols:          result.cols,
        size:          result.size,
        processingTime: result.processingTime,
        isZeroCopy:    result.isZeroCopy,
        schema:        result.schema || null,
        receivedAt:    Date.now(),
        receiver:      sourceId,
      });

      /* preview */
      const preview = q('preview');
      preview.className = 'preview has-data';
      if (result.data !== undefined) {
        preview.textContent = JSON.stringify(result.data, null, 2).slice(0, 300);
      } else if (result.table) {
        const t = result.table;
        const lines = ['Arrow: ' + result.rows + ' × ' + result.cols + '  zeroCopy=' + result.isZeroCopy];
        for (let r = 0; r < Math.min(result.rows, 3); r++) {
          const obj = {};
          for (let c = 0; c < t.schema.fields.length; c++)
            obj[t.schema.fields[c].name] = t.getChildAt(c).get(r);
          lines.push('  ' + JSON.stringify(obj));
        }
        if (result.rows > 3) lines.push('  … (' + (result.rows - 3) + ' more)');
        preview.textContent = lines.join('\n');
      }

      if (isFirst) {
        setListenActive(false);
        log('⏸ Paused after FIRST_MESSAGE', 'warn');
        relay('⏸ Paused — awaiting resumeListening()', 'warn', receiver.getState());
      }
    })
    .onError((err) => {
      log('❌ ' + err.message, 'err');
      relay('❌ ' + err.message, 'err', receiver.getState());
    });

  /* ── Reverse channel: child → parent (raw postMessage) ── */
  q('btn-reply').addEventListener('click', () => {
    const msgId = 'reply-' + Date.now();
    const payload = {
      __iframeFlight: 'child-reply',
      sourceId,
      messageId: msgId,
      timestamp: Date.now(),
      data: { text: 'Hello from ' + sourceId, ts: Date.now() },
    };
    window.parent.postMessage(payload, '*');
    log('↑ Sent reply to parent (raw postMessage)', 'ok');
    relay('↑ Reply sent to parent', 'ok', receiver.getState(), {
      messageId: msgId, timestamp: payload.timestamp, source: sourceId, target: 'parent',
    });
  });

  /* ── Commands from parent ── */
  window.addEventListener('message', (e) => {
    if (!e.data) return;
    if (e.data.__iframeFlight === 'resume') {
      receiver.resumeListening();
      setListenActive(true);
      log('▶ resumeListening() called', 'ok');
      relay('▶ resumeListening()', 'ok', receiver.getState());
    }
    /* Relay: parent forwards a message originally from another child */
    if (e.data.__iframeFlight === 'relay') {
      log('📨 Relayed from ' + e.data.from + ': ' + JSON.stringify(e.data.payload).slice(0, 80), 'recv');
      relay('📨 Relayed from ' + e.data.from, 'recv', receiver.getState(), {
        relayedFrom: e.data.from, payload: e.data.payload
      });
      const preview = q('preview');
      preview.className = 'preview has-data';
      preview.textContent = 'RELAY from ' + e.data.from + ':\n' + JSON.stringify(e.data.payload, null, 2).slice(0, 250);
    }
  });
</script>
</body>
</html>
