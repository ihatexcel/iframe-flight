<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #94a3b8;
      padding: 0.75rem;
      font-size: 0.8rem;
    }
    p { margin: 0.2rem 0; }
    .ok  { color: #34d399; }
    .err { color: #f87171; }
    .info { color: #60a5fa; }
  </style>
</head>
<body>
  <p id="status">Initializing…</p>

  <script type="module">
    import { ArrowChildReceiver, ListenMode, State } from '../dist/index.js';

    function relay(msg, level, state) {
      window.parent.postMessage({ type: '__DEMO_LOG__', msg, level, state }, '*');
    }

    function setStatus(msg, cls = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls;
    }

    const receiver = new ArrowChildReceiver({
      listenMode: ListenMode.CONTINUOUS,
      listenDelay: 0,
      allowedOrigins: ['*'],
    });

    receiver
      .onStateChange((next, prev) => {
        relay(`State: ${prev} → ${next}`, 'info', next);
        setStatus(`State: ${next}`, next === State.READY ? 'ok' : '');
      })
      .onData((result) => {
        const mode = result.isZeroCopy ? '⚡ zero-copy' : 'copy';
        const summary = `Received [${result.format}] ${mode} | rows=${result.rows} cols=${result.cols} size=${result.size}b time=${result.processingTime}ms`;
        relay(summary, 'ok', receiver.getState());
        setStatus(summary, 'ok');

        if (result.data) {
          relay(`Data preview: ${JSON.stringify(result.data).slice(0, 120)}`, '', receiver.getState());
        }
      })
      .onError((err) => {
        relay(`Error: ${err.message}`, 'err', receiver.getState());
        setStatus(`Error: ${err.message}`, 'err');
      });
  </script>
</body>
</html>
